<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100px;
        }
        .navbar {
            position: sticky;
            top: 0;
        }
        .relative {
           border: 2px solid black;
            position: relative;
            height: 50px;
             margin: 20px;
             background-color: bisque;
        }
        .absolute {
            border: 2px solid black;
            position: absolute;
            margin: 10px;
             margin-left: 50px;
             background-color: rgb(221, 29, 189);
        }
        .fixed {
            position: fixed;
        }
    </style>
</head>
<body>
    <div class="navbar"></div>
    <nav>
        <ul>
            <li>home</li>
            <li>about</li>
            <li>contact</li>
        </ul>
    </nav>
    </div>
    <div class="relative">
        <h1>relative</h1>
        <div class="absolute">
            <h1>absolute</h1>
        </div>
    </div>
    <div class="fixed">
        <h1>fixed</h1>
    </div>
</body>
</html>
