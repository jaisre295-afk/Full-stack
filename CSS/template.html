<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 50px 200px 50px;
        }
        .header {
            background-color: rgb(111, 163, 223);
            grid-column-start: 1;
            grid-column-end: 3;
        }
        .sidebar {
            background-color: rgb(207, 123, 240);
        }
        .content {
            background-color: rgb(95, 42, 165);  
        }
        .footer {
            background-color: rgb(165, 50, 231);
            grid-column-start: 1;
            grid-column-end: 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header"></header>
        <aside class="sidebar"></aside>
        <main class="content"></main>
        <footer class="footer"></footer>
    </div>
</body>
</html>
